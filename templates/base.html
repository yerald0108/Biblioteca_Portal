<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Portal Institucional{% endblock %}</title>

  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">

  {% block extra_css %}{% endblock %}
</head>
<body>

  {% include 'includes/navbar.html' %}

  <main class="main-content">
    <div class="container">

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert--{{ message.tags }}">
            {{ message }}
            <button class="alert__close" onclick="this.parentElement.remove()">×</button>
          </div>
        {% endfor %}
      {% endif %}

      {% block content %}{% endblock %}

    </div>
  </main>

  {% include 'includes/footer.html' %}

  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
