{% extends 'base.html' %}
{% block title %}{{ titulo }} · Portal Institucional{% endblock %}

{% block content %}
<div style="max-width:560px; margin:0 auto;">
  <div class="page-header">
    <h1 class="page-header__title">{{ titulo }}</h1>
    <a href="{% url 'biblioteca:categoria_list' %}" class="btn btn--secondary">Cancelar</a>
  </div>
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Nombre *</label>
        {{ form.nombre }}
        {% if form.nombre.errors %}
          <div class="error-text">{{ form.nombre.errors.0 }}</div>
        {% endif %}
      </div>
      <div class="form-group">
        <label>Descripción</label>
        {{ form.descripcion }}
      </div>
      <div style="display:flex; justify-content:flex-end; gap:8px;">
        <a href="{% url 'biblioteca:categoria_list' %}" class="btn btn--secondary">Cancelar</a>
        <button type="submit" class="btn btn--primary">{{ accion }}</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
